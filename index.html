<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brunner PIM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #e8c547;
    --accent2: #4a9eff;
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --green: #4caf7d;
    --red: #e05252;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }


  /* LOGIN SCHERM */
  .login-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .login-header { text-align: center; margin-bottom: 8px; }

  /* LAYOUT */
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }

  .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .search-wrap input, .search-wrap select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus, .search-wrap select:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap select { cursor: pointer; padding: 7px 10px; }
  .search-wrap select option { background: var(--surface); }

  .product-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .product-list::-webkit-scrollbar { width: 4px; }
  .product-list::-webkit-scrollbar-track { background: transparent; }
  .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .product-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .1s;
  }
  .product-item:hover { background: var(--surface2); }
  .product-item.active { background: var(--surface2); border-left-color: var(--accent); }

  .product-item-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .product-item-meta {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .completeness-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 5px;
    overflow: hidden;
  }
  .completeness-fill {
    height: 100%;
    border-radius: 1px;
    transition: width .3s;
  }

  /* MAIN */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 12px;
    flex-shrink: 0;
  }

  .main-header-left { min-width: 0; }

  .product-title {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-ean {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .btn {
    padding: 7px 16px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #f0d060; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .tab {
    padding: 12px 16px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    gap: 8px;
  }
  .empty-state-icon { font-size: 32px; opacity: .3; }
  .empty-state-text { font-size: 14px; }

  /* FORM */
  .section {
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .field-required {
    color: var(--accent);
    font-size: 10px;
  }

  .field input, .field textarea, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent2);
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface2); }

  .field-full { grid-column: 1 / -1; }

  /* MARKETPLACE TABS */
  .mp-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .mp-btn {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    transition: all .15s;
  }
  .mp-btn:hover { border-color: var(--text2); color: var(--text); }
  .mp-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* CATEGORY SELECT */
  .cat-select-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cat-select-label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  .cat-select-wrap select {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .cat-select-wrap select option { background: var(--surface); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all .25s;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-bol { background: #fff3; color: #4a9eff; }
  .badge-obelink { background: #fff3; color: #f0a050; }
  .badge-decathlon { background: #fff3; color: #4caf7d; }
  .badge-amazon { background: #fff3; color: #f0c040; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-size: 13px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .stat span { color: var(--text2); }

  .image-preview {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .image-thumb {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .no-product {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }
</style>
</head>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-header">
      <div class="logo" style="margin-bottom: 2px;">Brunner PIM</div>
      <div class="logo-sub">Inloggen vereist</div>
    </div>
    <div class="field">
      <label class="field-label">E-mailadres</label>
      <input type="email" id="loginEmail" placeholder="naam@bedrijf.nl">
    </div>
    <div class="field">
      <label class="field-label">Wachtwoord</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()" style="width: 100%; margin-top: 8px;">Inloggen</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Brunner PIM</div>
      <div class="logo-sub">Product Informatie Systeem</div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Zoek op naam, EAN, MPN..." autocomplete="off">
      <select id="categoryFilter" onchange="applyFilters()">

      </select>
    </div>
    <div class="product-list" id="productList">
      <div class="loading">Producten laden...</div>
    </div>
    <div class="stats-row">

    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="noProduct" class="no-product">
      <div style="font-size:32px;opacity:.2">◈</div>
      <div style="font-size:14px">Selecteer een product</div>
    </div>

    <div id="productEditor" style="display:none; display:none; flex-direction:column; height:100%; overflow:hidden;">
      <div class="main-header">
        <div class="main-header-left">

          <div class="product-ean" id="editorEan">—</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="saveStatus" style="font-size:12px;color:var(--text3);"></span>
          <button class="btn btn-ghost" onclick="discardChanges()">Annuleer</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Opslaan</button>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('basis', this)">Basisinfo</div>
        <div class="tab" onclick="switchTab('attributen', this)">Attributen</div>
        <div class="tab" onclick="switchTab('marketplaces', this)">Marketplaces</div>
        <div class="tab" onclick="switchTab('amazon', this)">Amazon teksten</div>
      </div>

      <div class="content" id="tabContent">
        <div class="loading">Product laden...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Auth State Check
sb.auth.onAuthStateChange((event, session) => {
  const loginScreen = document.getElementById('loginScreen');
  const mainApp = document.getElementById('mainApp');
  if (session) {
    loginScreen.style.display = 'none';
    mainApp.style.display = 'grid';
    if (allProducts.length === 0) {
      loadProducts();
      loadTemplates();
      loadFieldOptions();
    }
  } else {
    loginScreen.style.display = 'flex';
    mainApp.style.display = 'none';
  }
});

async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { showToast('Vul e-mail en wachtwoord in', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Bezig...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) showToast(error.message, 'error');
  else showToast('Succesvol ingelogd', 'success');
  btn.disabled = false; btn.textContent = 'Inloggen';
}

async function handleLogout() {
  await sb.auth.signOut();
  showToast('Uitgelogd', 'success');
  allProducts = [];
  document.getElementById('productList').innerHTML = '';
  document.getElementById('productEditor').style.display = 'none';
  document.getElementById('noProduct').style.display = 'flex';
}



async function loadProducts() {
  document.getElementById('productList').innerHTML = '<div class="loading">Producten laden...</div>';
  const [pRes, cRes] = await Promise.all([
    sb.from('products').select('id, ean, naam_nl, mpn, serie, merk').order('naam_nl'),
    sb.from('product_categories').select('product_id, cat_bol, cat_obelink, cat_decathlon')
  ]);
  if (pRes.error) { showToast('Fout bij laden producten', 'error'); return; }
  const catMap = {};
  if (cRes.data) {
    cRes.data.forEach(c => {
      catMap[c.product_id] = [c.cat_bol, c.cat_obelink, c.cat_decathlon].filter(Boolean);
    });
  }
  const uniqueCats = new Set();
  allProducts = pRes.data.map(p => {
    const cats = catMap[p.id] || [];
    cats.forEach(c => uniqueCats.add(c));
    return { ...p, _categories: cats };
  });
  document.getElementById('statTotal').textContent = allProducts.length;
  const select = document.getElementById('categoryFilter');
  select.innerHTML = '<option value="">Alle categorieën</option>' +
    '<option value="UNASSIGNED">-- Zonder gekoppelde categorie --</option>' +
    Array.from(uniqueCats).sort().map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  applyFilters();
}

async function loadTemplates() {
  const { data } = await sb.from('category_templates').select('id, marketplace, categorie_naam');
  if (!data) return;
  allTemplates = {};
  data.forEach(t => {
    if (!allTemplates[t.marketplace]) allTemplates[t.marketplace] = [];
    allTemplates[t.marketplace].push(t);
  });
}

function renderProductList(products) {
  const list = document.getElementById('productList');
  if (!products.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:13px;text-align:center;">Geen producten gevonden</div>';
    return;
  }
  list.innerHTML = products.map(p => `
    <div class="product-item ${currentProduct?.id === p.id ? 'active' : ''}"
         onclick="selectProduct('${p.id}')">
      <div class="product-item-name">${escHtml(p.naam_nl || '—')}</div>
      <div class="product-item-meta">${escHtml(p.mpn || p.ean || '—')}</div>
    </div>
  `).join('');
}

async function getTemplateFields(marketplace, categorie_naam) {
  const cacheKey = `${marketplace}::${categorie_naam}`;
  if (templateFieldsCache[cacheKey]) return templateFieldsCache[cacheKey];
  const template = (allTemplates[marketplace] || []).find(t => t.categorie_naam === categorie_naam);
  if (!template) return [];
  const { data } = await sb.from('category_template_fields').select('master_veld, verplicht, volgorde').eq('template_id', template.id).order('volgorde');
  templateFieldsCache[cacheKey] = data || [];
  return data || [];
}

async function getActiveTemplateFields() {
  const c = currentCats;
  const mpMappings = [
    { mp: 'bol', catKey: 'cat_bol' },
    { mp: 'obelink', catKey: 'cat_obelink' },
    { mp: 'decathlon', catKey: 'cat_decathlon' },
  ];
  let allFields = {};
  let hasAnyTemplate = false;
  for (const { mp, catKey } of mpMappings) {
    const cat = c[catKey];
    if (!cat) continue;
    const fields = await getTemplateFields(mp, cat);
    if (fields.length) hasAnyTemplate = true;
    fields.forEach(f => {
      if (!allFields[f.master_veld]) allFields[f.master_veld] = { verplicht: f.verplicht, volgorde: f.volgorde };
      else if (f.verplicht) allFields[f.master_veld].verplicht = true;
    });
  }
  return { fields: allFields, hasAnyTemplate };
}

function getKenmerkenVoorCategorie() {
  const obelinkCat = currentCats?.cat_obelink;
  if (!obelinkCat) return [];
  return catKenmerken[obelinkCat] || [];
}

function getKenmerkenWaardes() {
  // Lees huidige kenmerken JSON uit attrs
  const raw = currentAttrs?.kenmerken || '{}';
  try {
    // Probeer als JSON, anders als oude pipe-string
    if (raw.startsWith('{')) return JSON.parse(raw);
    // Migreer oude pipe-string naar JSON object
    const obj = {};
    raw.split(' | ').forEach(k => { if (k.trim()) obj[k.trim()] = 'Ja'; });
    return obj;
  } catch(e) { return {}; }
}

function setKenmerkWaarde(kenmerk, waarde) {
  const huidig = getKenmerkenWaardes();
  if (waarde === '') {
    delete huidig[kenmerk];
  } else {
    huidig[kenmerk] = waarde;
  }
  const newVal = JSON.stringify(huidig);
  if (!pendingChanges.attrs) pendingChanges.attrs = {};
  pendingChanges.attrs['kenmerken'] = newVal;
  isDirty = true;
  document.getElementById('saveStatus').textContent = '● Niet opgeslagen';
}



// Filters & Search
document.getElementById('searchInput').addEventListener('input', applyFilters);

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('categoryFilter').value;
  filteredProducts = allProducts.filter(p => {
    const matchText = !q ||
      (p.naam_nl || '').toLowerCase().includes(q) ||
      (p.ean || '').includes(q) ||
      (p.mpn || '').toLowerCase().includes(q);
    let matchCat = true;
    if (cat === 'UNASSIGNED') matchCat = (p._categories || []).length === 0;
    else if (cat) matchCat = (p._categories || []).includes(cat);
    return matchText && matchCat;
  });
  document.getElementById('statLoaded').textContent = filteredProducts.length;
  renderProductList(filteredProducts);
}

async function selectProduct(id) {
  if (isDirty && !confirm('Je hebt onopgeslagen wijzigingen. Doorgaan?')) return;
  isDirty = false;
  pendingChanges = {};

  // Laad volledig product
  const [pRes, aRes, cRes] = await Promise.all([
    sb.from('products').select('*').eq('id', id).single(),
    sb.from('product_attributes').select('*').eq('product_id', id).single(),
    sb.from('product_categories').select('*').eq('product_id', id).single(),
  ]);

  currentProduct = pRes.data;
  currentAttrs = aRes.data || {};
  currentCats = cRes.data || {};

  document.getElementById('noProduct').style.display = 'none';
  const editor = document.getElementById('productEditor');
  editor.style.display = 'flex';

  document.getElementById('editorTitle').textContent = currentProduct.naam_nl || '—';
  document.getElementById('editorEan').textContent = `EAN: ${currentProduct.ean || '—'} · MPN: ${currentProduct.mpn || '—'}`;
  document.getElementById('saveStatus').textContent = '';

  renderProductList(filteredProducts.length ? filteredProducts : allProducts);
  switchTab(currentTab, document.querySelector('.tab.active'));
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderTab();
}

function renderTab() {
  const content = document.getElementById('tabContent');
  if (!currentProduct) return;

  if (currentTab === 'basis') renderBasis(content);
  else if (currentTab === 'attributen') renderAttributen(content);
  else if (currentTab === 'marketplaces') renderMarketplaces(content);
  else if (currentTab === 'amazon') renderAmazon(content);
}

  templateFieldsCache = {};

async function loadFieldOptions() {
  const { data } = await sb.from('field_options').select('master_veld, multi, opties');
  if (!data) return;
  data.forEach(r => {
    fieldOptions[r.master_veld] = { opties: r.opties, multi: r.multi };
  });
}

function field(key, label, value, type='text', source='product', required=false, fullWidth=false) {
  const val = value ?? '';
  const fw = fullWidth ? ' field-full' : '';
  const reqHtml = required ? ' <span class="field-required">●</span>' : '';

  // Check of dit veld vaste opties heeft
  const opts = fieldOptions[key];

  if (opts && opts.multi) {
    const selected = val ? val.split(' | ').map(s => s.trim()).filter(Boolean) : [];
    const uid = 'ms_' + key + '_' + source;

    if (opts.opties.length <= 6) {
      // Weinig opties: gewone checkboxes
      const checkboxes = opts.opties.map(o => {
        const checked = selected.includes(o) ? 'checked' : '';
        const safeO = escHtml(o);
        return `<label style="display:inline-flex;align-items:center;gap:4px;margin:2px 4px 2px 0;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;">
          <input type="checkbox" ${checked} data-key="${key}" data-source="${source}" data-multi="true"
            onchange="markMulti(this, '${key}', '${source}')" style="cursor:pointer;"> ${safeO}
        </label>`;
      }).join('');
      return `<div class="field${fw}">
        <label class="field-label">${escHtml(label)}${reqHtml}</label>
        <div style="padding:6px 0;line-height:1.8;">${checkboxes}</div>
      </div>`;
    }

    // Veel opties: doorzoekbare multi-select dropdown
    const tagsHtml = selected.map(s =>
      `<span class="ms-tag">${escHtml(s)}<span class="ms-tag-remove" onclick="msRemoveTag(this,'${uid}','${escHtml(key)}','${escHtml(source)}')" data-val="${escHtml(s)}">×</span></span>`
    ).join('');
    const allOptsJson = escHtml(JSON.stringify(opts.opties));
    return `<div class="field${fw} ms-wrap" id="${uid}_wrap">
      <label class="field-label">${escHtml(label)}${reqHtml}</label>
      <div class="ms-input" onclick="msFocus('${uid}')">
        <span id="${uid}_tags">${tagsHtml}</span>
        <input class="ms-search" id="${uid}_search" type="text" placeholder="${selected.length ? '' : 'Zoek of kies...'}"
          oninput="msFilter('${uid}')"
          onfocus="msOpen('${uid}')"
          data-key="${escHtml(key)}" data-source="${escHtml(source)}"
          data-opts="${allOptsJson}"
          data-selected="${escHtml(selected.join(' | '))}">
      </div>
      <div class="ms-dropdown" id="${uid}_dd"></div>
    </div>`;
  }

  if (opts && !opts.multi) {
    // Single-select dropdown
    const options = opts.opties.map(o =>
      `<option value="${escHtml(o)}" ${o === val ? 'selected' : ''}>${escHtml(o)}</option>`
    ).join('');
    return `<div class="field${fw}">
      <label class="field-label">${escHtml(label)}${reqHtml}</label>
      <select data-key="${key}" data-source="${source}" onchange="markDirty(this)">
        <option value="">— Kies —</option>
        ${options}
      </select>
    </div>`;
  }

  // Vrij tekstveld (geen opties bekend)
  if (type === 'textarea') {
    return `<div class="field${fw}">
      <label class="field-label">${escHtml(label)}${reqHtml}</label>
      <textarea rows="4" data-key="${key}" data-source="${source}" onchange="markDirty(this)">${escHtml(val)}</textarea>
    </div>`;
  }
  return `<div class="field${fw}">
    <label class="field-label">${escHtml(label)}${reqHtml}</label>
    <input type="${type}" data-key="${key}" data-source="${source}" value="${escHtml(val)}" oninput="markDirty(this)" placeholder="—">
  </div>`;
}

function markMulti(el, key, source) {
  const allCheckboxes = document.querySelectorAll(
    `input[type=checkbox][data-key="${key}"][data-source="${source}"]`
  );
  const selected = Array.from(allCheckboxes)
    .filter(cb => cb.checked)
    .map(cb => cb.closest('label').textContent.trim());
  const combined = selected.join(' | ');
  if (!pendingChanges[source]) pendingChanges[source] = {};
  pendingChanges[source][key] = combined;
  isDirty = true;
  document.getElementById('saveStatus').textContent = '● Niet opgeslagen';
}

// Multi-select dropdown functies
function msOpen(uid) {
  const dd = document.getElementById(uid + '_dd');
  const search = document.getElementById(uid + '_search');
  if (!dd || !search) return;
  msRender(uid, search.value);
  dd.classList.add('open');
  // Sluit bij klik buiten
  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      const wrap = document.getElementById(uid + '_wrap');
      if (wrap && !wrap.contains(e.target)) {
        dd.classList.remove('open');
        document.removeEventListener('click', handler);
      }
    });
  }, 10);
}

function msFocus(uid) {
  const search = document.getElementById(uid + '_search');
  if (search) { search.focus(); msOpen(uid); }
}

function msFilter(uid) {
  msRender(uid, document.getElementById(uid + '_search').value);
}

function msRender(uid, query) {
  const search = document.getElementById(uid + '_search');
  const dd = document.getElementById(uid + '_dd');
  if (!search || !dd) return;
  const opts = JSON.parse(search.dataset.opts || '[]');
  const selected = search.dataset.selected ? search.dataset.selected.split(' | ').filter(Boolean) : [];
  const q = query.toLowerCase();
  const filtered = opts.filter(o => !q || o.toLowerCase().includes(q));
  if (!filtered.length) {
    dd.innerHTML = '<div class="ms-empty">Geen resultaten</div>';
    return;
  }
  dd.innerHTML = filtered.map(o => {
    const isSel = selected.includes(o);
    return `<div class="ms-option ${isSel ? 'selected' : ''}" onclick="msToggle('${uid}','${escHtml(o)}')">
      <span class="ms-option-check">${isSel ? '✓' : ''}</span>
      ${escHtml(o)}
    </div>`;
  }).join('');
}

function msToggle(uid, val) {
  const search = document.getElementById(uid + '_search');
  if (!search) return;
  let selected = search.dataset.selected ? search.dataset.selected.split(' | ').filter(Boolean) : [];
  const idx = selected.indexOf(val);
  if (idx >= 0) selected.splice(idx, 1);
  else selected.push(val);
  search.dataset.selected = selected.join(' | ');
  // Update tags
  const tagsEl = document.getElementById(uid + '_tags');
  if (tagsEl) {
    tagsEl.innerHTML = selected.map(s =>
      `<span class="ms-tag">${escHtml(s)}<span class="ms-tag-remove" onclick="msRemoveTag(this,'${uid}','${escHtml(search.dataset.key)}','${escHtml(search.dataset.source)}')" data-val="${escHtml(s)}">×</span></span>`
    ).join('');
  }
  // Update pending
  const key = search.dataset.key;
  const source = search.dataset.source;
  if (!pendingChanges[source]) pendingChanges[source] = {};
  pendingChanges[source][key] = selected.join(' | ');
  isDirty = true;
  document.getElementById('saveStatus').textContent = '● Niet opgeslagen';
  // Herrender dropdown
  msRender(uid, search.value);
}

function msRemoveTag(el, uid, key, source) {
  event.stopPropagation();
  const val = el.dataset.val;
  msToggle(uid, val);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function markDirty(el) {
  isDirty = true;
  const source = el.dataset.source;
  const key = el.dataset.key;
  if (!pendingChanges[source]) pendingChanges[source] = {};
  pendingChanges[source][key] = el.value;
  document.getElementById('saveStatus').textContent = '● Niet opgeslagen';
}

async function saveProduct() {
  if (!currentProduct) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Opslaan...';

  try {
    const updates = pendingChanges;

    // Update products tabel
    if (updates.product && Object.keys(updates.product).length) {
      const { error } = await sb.from('products')
        .update({ ...updates.product, bijgewerkt_op: new Date().toISOString() })
        .eq('id', currentProduct.id);
      if (error) throw error;
      Object.assign(currentProduct, updates.product);
    }

    // Update product_attributes
    if (updates.attrs && Object.keys(updates.attrs).length) {
      if (currentAttrs.id) {
        const { error } = await sb.from('product_attributes')
          .update({ ...updates.attrs, bijgewerkt_op: new Date().toISOString() })
          .eq('product_id', currentProduct.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('product_attributes')
          .insert({ product_id: currentProduct.id, ...updates.attrs });
        if (error) throw error;
      }
      Object.assign(currentAttrs, updates.attrs);
    }

    // Update product_categories
    if (updates.cats && Object.keys(updates.cats).length) {
      if (currentCats.id) {
        const { error } = await sb.from('product_categories')
          .update({ ...updates.cats, bijgewerkt_op: new Date().toISOString() })
          .eq('product_id', currentProduct.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('product_categories')
          .insert({ product_id: currentProduct.id, ...updates.cats });
        if (error) throw error;
      }
      Object.assign(currentCats, updates.cats);
      onCategorySaved(); // invalideer template velden cache
    }

    isDirty = false;
    pendingChanges = {};
    document.getElementById('saveStatus').textContent = '✓ Opgeslagen';
    document.getElementById('editorTitle').textContent = currentProduct.naam_nl || '—';

    // Update sidebar
    const idx = allProducts.findIndex(p => p.id === currentProduct.id);
    if (idx >= 0 && updates.product?.naam_nl) allProducts[idx].naam_nl = updates.product.naam_nl;
    renderProductList(filteredProducts.length ? filteredProducts : allProducts);

    showToast('Product opgeslagen', 'success');
  } catch(e) {
    showToast('Fout bij opslaan: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Opslaan';
}

function discardChanges() {
  if (!isDirty || confirm('Wijzigingen weggooien?')) {
    isDirty = false;
    pendingChanges = {};
    document.getElementById('saveStatus').textContent = '';
    renderTab();
  }
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
